# Logstash Pipeline: Kafka to Elasticsearch
# Consumes logs, metrics, and events from Kafka topics and indexes them into Elasticsearch

input {
  # Application Logs from Kafka
  kafka {
    bootstrap_servers => "${KAFKA_BROKERS:localhost:9092}"
    topics => ["application-logs"]
    group_id => "logstash-logs-consumer"
    consumer_threads => 2
    decorate_events => true
    codec => json
    auto_offset_reset => "earliest"
    enable_auto_commit => true
    session_timeout_ms => 30000
    max_poll_records => 500
    tags => ["kafka", "logs"]
  }

  # System Metrics from Kafka
  kafka {
    bootstrap_servers => "${KAFKA_BROKERS:localhost:9092}"
    topics => ["system-metrics"]
    group_id => "logstash-metrics-consumer"
    consumer_threads => 2
    decorate_events => true
    codec => json
    auto_offset_reset => "earliest"
    enable_auto_commit => true
    session_timeout_ms => 30000
    max_poll_records => 500
    tags => ["kafka", "metrics"]
  }

  # Business Events from Kafka
  kafka {
    bootstrap_servers => "${KAFKA_BROKERS:localhost:9092}"
    topics => ["business-events"]
    group_id => "logstash-events-consumer"
    consumer_threads => 2
    decorate_events => true
    codec => json
    auto_offset_reset => "earliest"
    enable_auto_commit => true
    session_timeout_ms => 30000
    max_poll_records => 500
    tags => ["kafka", "events"]
  }
}

filter {
  # Add metadata
  mutate {
    add_field => {
      "[@metadata][pipeline_processed_at]" => "%{@timestamp}"
      "[@metadata][logstash_version]" => "${LOGSTASH_VERSION:8.11.0}"
    }
  }

  # Parse timestamp if it exists
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd'T'HH:mm:ssZ"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Process Application Logs
  if "logs" in [tags] {
    # Enrich log data
    mutate {
      add_field => {
        "[@metadata][target_index]" => "pipeline-logs-%{+YYYY.MM.dd}"
        "data_type" => "log"
      }
    }

    # Parse error stack traces
    if [error][stack_trace] {
      mutate {
        gsub => [
          "[error][stack_trace]", "\n", " | "
        ]
      }
    }

    # Geo IP lookup for IP addresses
    if [ip_address] {
      geoip {
        source => "ip_address"
        target => "geo"
        add_field => {
          "geo_enabled" => "true"
        }
      }
    }

    # Parse user agent
    if [user_agent] {
      useragent {
        source => "user_agent"
        target => "user_agent_details"
      }
    }

    # Categorize log levels
    if [level] {
      mutate {
        lowercase => ["level"]
      }

      if [level] == "error" or [level] == "critical" {
        mutate {
          add_field => {
            "alert_required" => "true"
            "severity" => "high"
          }
        }
      } else if [level] == "warning" {
        mutate {
          add_field => {
            "alert_required" => "false"
            "severity" => "medium"
          }
        }
      } else {
        mutate {
          add_field => {
            "alert_required" => "false"
            "severity" => "low"
          }
        }
      }
    }

    # Calculate response time categories
    if [response_time_ms] {
      ruby {
        code => '
          response_time = event.get("response_time_ms").to_i
          if response_time < 100
            event.set("response_category", "fast")
          elsif response_time < 500
            event.set("response_category", "normal")
          elsif response_time < 1000
            event.set("response_category", "slow")
          else
            event.set("response_category", "very_slow")
          end
        '
      }
    }
  }

  # Process System Metrics
  if "metrics" in [tags] {
    # Enrich metrics data
    mutate {
      add_field => {
        "[@metadata][target_index]" => "pipeline-metrics-%{+YYYY.MM.dd}"
        "data_type" => "metric"
      }
    }

    # Calculate health score
    ruby {
      code => '
        cpu = event.get("[cpu][usage_percent]")
        memory = event.get("[memory][usage_percent]")
        disk = event.get("[disk][usage_percent]")

        if cpu && memory && disk
          cpu_score = [100 - cpu.to_f, 0].max
          memory_score = [100 - memory.to_f, 0].max
          disk_score = [100 - disk.to_f, 0].max

          health_score = (cpu_score + memory_score + disk_score) / 3.0
          event.set("health_score", health_score.round(2))

          if health_score >= 70
            event.set("health_status", "healthy")
          elsif health_score >= 50
            event.set("health_status", "warning")
          else
            event.set("health_status", "critical")
          end
        end
      '
    }

    # Detect anomalies
    if [cpu][usage_percent] {
      ruby {
        code => '
          cpu = event.get("[cpu][usage_percent]").to_f
          if cpu > 90
            event.set("cpu_anomaly", "critical")
            event.set("alert_required", "true")
          elsif cpu > 80
            event.set("cpu_anomaly", "warning")
            event.set("alert_required", "false")
          end
        '
      }
    }

    if [memory][usage_percent] {
      ruby {
        code => '
          memory = event.get("[memory][usage_percent]").to_f
          if memory > 90
            event.set("memory_anomaly", "critical")
            event.set("alert_required", "true")
          elsif memory > 85
            event.set("memory_anomaly", "warning")
            event.set("alert_required", "false")
          end
        '
      }
    }
  }

  # Process Business Events
  if "events" in [tags] {
    # Enrich events data
    mutate {
      add_field => {
        "[@metadata][target_index]" => "pipeline-events-%{+YYYY.MM.dd}"
        "data_type" => "event"
      }
    }

    # Add event processing metadata
    mutate {
      add_field => {
        "event_processed" => "true"
        "event_version" => "1.0"
      }
    }
  }

  # Remove Kafka metadata fields
  mutate {
    remove_field => [
      "[@metadata][kafka][topic]",
      "[@metadata][kafka][consumer_group]",
      "[@metadata][kafka][partition]",
      "[@metadata][kafka][offset]",
      "[@metadata][kafka][key]",
      "[@metadata][kafka][timestamp]"
    ]
  }

  # Clean up null or empty fields
  ruby {
    code => '
      event.to_hash.each do |key, value|
        if value.nil? || (value.is_a?(String) && value.empty?)
          event.remove(key)
        end
      end
    '
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
    index => "%{[@metadata][target_index]}"
    document_id => "%{[@metadata][_id]}"

    # Connection settings
    manage_template => false
    ilm_enabled => false

    # Performance tuning
    bulk_size => 500
    flush_size => 500
    idle_flush_time => 5

    # Retry settings
    retry_on_conflict => 3
    retry_max_interval => 5

    # Health check
    healthcheck_path => "/_cluster/health"
  }

  # Debug output (comment out in production)
  # stdout {
  #   codec => rubydebug {
  #     metadata => true
  #   }
  # }

  # Error handling - write failed events to file
  if "_elasticsearch_output_failure" in [tags] {
    file {
      path => "/var/log/logstash/failed_events_%{+YYYY-MM-dd}.log"
      codec => json_lines
    }
  }
}
